<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
   <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .rotatingtext-widget {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .circle {
            width: min(calc(100vh - 20px - 4px), calc(100vw - 20px - 4px));
            height: min(calc(100vh - 20px - 4px), calc(100vw - 20px - 4px));
            padding: 10px;
            background: rgba(0, 0, 0, 0);
            border: 2px solid rgba(0, 0, 0, 1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-sizing: border-box;
            text-decoration: none;
            cursor: default;
            position: relative;
            container-type: size;
        }
        .circle svg {
            width: 100%;
            height: 100%;
        }
        .circle text {
            font-size: 13px;
            font-family: Open Sans, serif;
            fill: rgba(0, 0, 0, 1);
            animation: rotate-left 60s linear infinite;
            letter-spacing: 2px;
            transform-origin: center;
            dominant-baseline: ideographic;
        }
        @keyframes rotate-left {
            to { transform: rotate(-360deg); }
        }
        @keyframes rotate-right {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="rotatingtext-widget">
        <div class="circle">
            <svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" x="0px" y="0px" width="100%" height="100%" viewBox="0 0 100 100" enable-background="new 0 0 100 100" xml:space="preserve">
                <path id="textPath" fill="none" d="M50,15 A35,35 0 1,1 49.999,15"/>
                <text>
                    <textPath xlink:href="#textPath" startOffset="0%">
                        <tspan>New Catalog Every Week ❁</tspan>
                    </textPath>
                </text>
            </svg>
        </div>
    </div>
</body>
</html>
