<style>
  .sbw-countdown { font-family: system-ui, sans-serif; padding:16px; border:1px solid #e5e7eb; border-radius:14px; background:#fff; max-width:540px; margin:12px auto; box-shadow:0 4px 16px rgba(0,0,0,.06); }
  .sbw-title { margin:0 0 10px; font-size:16px; font-weight:700; color:#111827; text-align:center; }
  .sbw-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:8px; }
  .sbw-item { background:#f8fafc; border:1px solid #e2e8f0; border-radius:10px; padding:10px 6px; text-align:center; }
  .sbw-num { display:block; font-size:22px; font-weight:700; color:#1a73e8; line-height:1; }
  .sbw-lbl { display:block; margin-top:4px; font-size:11px; color:#6b7280; text-transform:uppercase; letter-spacing:.04em; }
</style>
<div class="sbw-countdown">
  <p class="sbw-title">Launch Ends In</p>
  <div class="sbw-grid">
    <div class="sbw-item"><span class="sbw-num">12</span><span class="sbw-lbl">Days</span></div>
    <div class="sbw-item"><span class="sbw-num">08</span><span class="sbw-lbl">Hours</span></div>
    <div class="sbw-item"><span class="sbw-num">27</span><span class="sbw-lbl">Min</span></div>
    <div class="sbw-item"><span class="sbw-num">43</span><span class="sbw-lbl">Sec</span></div>
  </div>
</div>
