<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artist Name — Discography</title>
  <meta name="description" content="Explore the full discography — powered by SitesBuddyAI">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <style>
    /* ─── RESET ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    /* ─── TOKENS ─── */
    :root {
      --bg:         #060608;
      --surface:    #111114;
      --surface-2:  #19191d;
      --surface-3:  #222228;
      --border:     rgba(255,255,255,0.06);
      --border-hover: rgba(255,255,255,0.12);
      --text:       #eee;
      --text-muted: #777;
      --accent:     #1db954;
      --accent-dim: rgba(29,185,84,0.12);
      --accent-glow: rgba(29,185,84,0.25);
      --radius:     14px;
      --radius-lg:  20px;
    }

    /* ─── BASE ─── */
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }

    /* ─── HERO SECTION ─── */
    .hero {
      position: relative;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      filter: blur(80px) saturate(1.8) brightness(0.3);
      transform: scale(1.5);
      opacity: 0.5;
    }

    .hero-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(6,6,8,0.3) 0%, var(--bg) 100%);
    }

    .hero-noise {
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px;
      pointer-events: none;
    }

    /* ─── ARTIST HEADER ─── */
    .artist-header {
      position: relative;
      padding: 100px 48px 72px;
      display: flex;
      align-items: flex-end;
      gap: 36px;
      max-width: 1200px;
      margin: 0 auto;
      z-index: 1;
    }

    .avatar-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .avatar-ring {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: conic-gradient(var(--accent), transparent 40%, var(--accent));
      opacity: 0.5;
      animation: spin 6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .artist-avatar {
      position: relative;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--bg);
      box-shadow: 0 0 40px rgba(29,185,84,0.15), 0 0 80px rgba(0,0,0,0.5);
    }

    .artist-info { flex: 1; }

    .artist-label {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: var(--accent);
      background: var(--accent-dim);
      padding: 4px 12px;
      border-radius: 100px;
      margin-bottom: 16px;
    }

    .artist-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(40px, 6vw, 72px);
      font-weight: 800;
      line-height: 1.0;
      letter-spacing: -2.5px;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #fff 0%, #ccc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .artist-meta {
      font-size: 14px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .artist-meta span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--text-muted); opacity: 0.5; }

    .bandcamp-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 20px;
      padding: 10px 24px;
      background: var(--accent);
      color: #000;
      font-weight: 600;
      font-size: 13px;
      border-radius: 100px;
      letter-spacing: 0.3px;
      transition: all 0.25s;
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .bandcamp-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px var(--accent-glow);
      filter: brightness(1.1);
    }

    .bandcamp-btn svg { width: 16px; height: 16px; }

    /* ─── SECTION ─── */
    .section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 56px 48px 96px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 36px;
    }

    .section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .release-count {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--surface-2);
      padding: 6px 14px;
      border-radius: 100px;
      border: 1px solid var(--border);
    }

    /* ─── ALBUM GRID ─── */
    .album-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    .album-card {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94), box-shadow 0.35s, border-color 0.35s;
    }

    .album-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 24px 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.08);
      border-color: var(--border-hover);
    }

    .album-art-wrap {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
    }

    .album-art {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: var(--surface-2);
      transition: transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94);
    }

    .album-card:hover .album-art {
      transform: scale(1.08);
    }

    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.7) 100%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .album-card:hover .play-overlay {
      opacity: 1;
    }

    .play-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(29,185,84,0.4);
      transform: translateY(12px) scale(0.8);
      transition: transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
    }

    .album-card:hover .play-btn {
      transform: translateY(0) scale(1);
    }

    .play-btn svg {
      width: 20px;
      height: 20px;
      fill: #000;
      margin-left: 2px;
    }

    .album-details {
      padding: 14px 16px 16px;
    }

    .album-title {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: -0.2px;
    }

    .album-year {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ─── ALBUM DETAIL VIEW ─── */
    .album-view {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: var(--bg);
      overflow-y: auto;
      animation: slideIn 0.4s cubic-bezier(0.22,1,0.36,1);
    }

    .album-view.active { display: block; }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .album-view-header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      padding: 16px 48px;
      background: rgba(6,6,8,0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
    }

    .back-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 18px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
      font-family: inherit;
    }

    .back-btn:hover {
      background: var(--surface-2);
      border-color: var(--border-hover);
    }

    .album-view-content {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 48px 100px;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 48px;
      align-items: start;
    }

    .album-view-art {
      width: 100%;
      border-radius: var(--radius-lg);
      aspect-ratio: 1;
      object-fit: cover;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
      position: sticky;
      top: 100px;
    }

    .album-view-info h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }

    .album-view-info .artist-link {
      font-size: 15px;
      color: var(--accent);
      margin-bottom: 24px;
      display: block;
    }

    .album-view-info .description {
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.7;
      margin-top: 28px;
    }

    /* ─── TRACKLIST ─── */
    .tracklist { list-style: none; }

    .tracklist li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-radius: 8px;
      transition: background 0.2s;
      font-size: 14px;
    }

    .tracklist li:hover { background: var(--surface); }

    .track-num {
      width: 28px;
      color: var(--text-muted);
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }

    .track-title { flex: 1; font-weight: 500; }

    .track-duration {
      color: var(--text-muted);
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }

    /* ─── BANDCAMP EMBED ─── */
    .embed-wrap {
      margin-top: 32px;
      border-radius: var(--radius);
      overflow: hidden;
    }

    .embed-wrap iframe { width: 100%; border: none; display: block; }

    /* ─── FOOTER ─── */
    .site-footer {
      text-align: center;
      padding: 48px;
      font-size: 12px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .site-footer a {
      color: var(--accent);
      transition: opacity 0.2s;
    }

    .site-footer a:hover { opacity: 0.7; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 1024px) {
      .album-grid { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 768px) {
      .hero-bg { filter: blur(60px) saturate(1.5) brightness(0.25); }
      .artist-header {
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: 72px 24px 48px;
        gap: 20px;
      }
      .artist-avatar { width: 120px; height: 120px; }
      .avatar-ring { inset: -3px; }
      .artist-meta { justify-content: center; }
      .bandcamp-btn { margin: 20px auto 0; }
      .section { padding: 32px 20px 64px; }
      .album-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
      .album-view-content {
        grid-template-columns: 1fr;
        padding: 32px 20px 80px;
        gap: 24px;
      }
      .album-view-art {
        max-width: 280px;
        margin: 0 auto;
        position: static;
      }
      .album-view-header { padding: 12px 20px; }
    }

    @media (max-width: 480px) {
      .album-grid { gap: 10px; }
      .album-details { padding: 10px 12px 14px; }
      .album-title { font-size: 13px; }
      .artist-name { letter-spacing: -1.5px; }
    }

    /* ─── LOADING STATE ─── */
    .loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 16px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--surface-2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .loading-text {
      font-size: 13px;
      color: var(--text-muted);
    }

    .album-card.skeleton .album-art-wrap {
      background: var(--surface-2);
    }

    .album-card.skeleton .album-details {
      background: var(--surface);
    }
  </style>
</head>
<body>

  <!-- ─── HERO ─── -->
  <div class="hero">
    <div class="hero-bg" id="heroBg"></div>
    <div class="hero-noise"></div>
    <header class="artist-header" id="top">
      <div class="avatar-wrap">
        <div class="avatar-ring"></div>
        <img class="artist-avatar" id="artistAvatar" src="" alt="">
      </div>
      <div class="artist-info">
        <div class="artist-label" id="artistLabel">Artist</div>
        <h1 class="artist-name" id="artistName"></h1>
        <div class="artist-meta" id="artistMeta"></div>
        <a class="bandcamp-btn" id="bandcampLink" href="#" target="_blank">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M1.5 17.5h9L22.5 6.5h-9z"/></svg>
          Listen on Bandcamp
        </a>
      </div>
    </header>
  </div>

  <!-- ─── DISCOGRAPHY GRID ─── -->
  <section class="section" id="discography">
    <div class="section-header">
      <h2 class="section-title">Discography</h2>
      <span class="release-count" id="releaseCount"></span>
    </div>
    <div class="album-grid" id="albumGrid">
      <div class="loading-screen" id="loadingScreen">
        <div class="spinner"></div>
        <div class="loading-text">Loading discography…</div>
      </div>
    </div>
  </section>

  <!-- ─── ALBUM DETAIL VIEW ─── -->
  <div class="album-view" id="albumView">
    <div class="album-view-header">
      <button class="back-btn" onclick="closeAlbum()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Back to Discography
      </button>
    </div>
    <div class="album-view-content">
      <img class="album-view-art" id="viewArt" src="" alt="">
      <div class="album-view-info">
        <h1 id="viewTitle"></h1>
        <span class="artist-link" id="viewArtist"></span>
        <ol class="tracklist" id="viewTracks"></ol>
        <div class="embed-wrap" id="viewEmbed"></div>
        <p class="description" id="viewDesc"></p>
      </div>
    </div>
  </div>

  <!-- ─── FOOTER ─── -->
  <footer class="site-footer">
    <p>Listen & support on <a href="#" id="footerLink" target="_blank">Bandcamp</a> — All rights belong to the original artists.</p>
  </footer>

  <script>
    // ╔════════════════════════════════════════╗
    // ║  CHANGE THIS URL TO ANY BANDCAMP PAGE  ║
    // ╚════════════════════════════════════════╝
    const BANDCAMP_URL = 'https://basswalk.bandcamp.com';

    // ─── CORS PROXIES ───
    const PROXIES = [
      url => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url),
      url => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
    ];

    async function fetchPage(url) {
      for (const proxy of PROXIES) {
        try {
          const res = await fetch(proxy(url), { signal: AbortSignal.timeout(10000) });
          if (!res.ok) continue;
          return await res.text();
        } catch (e) { continue; }
      }
      return null;
    }

    // ─── DECODE HTML ENTITIES ───
    function decodeEntities(str) {
      return str.replace(/&#39;/g, "'").replace(/&amp;/g, '&').replace(/&quot;/g, '"').replace(/&lt;/g, '<').replace(/&gt;/g, '>').trim();
    }

    // ─── LOAD ARTIST PAGE ───
    async function loadDiscography() {
      const baseUrl = BANDCAMP_URL.replace(/\/+$/, '');
      const musicUrl = baseUrl + '/music';

      // Update links
      document.getElementById('bandcampLink').href = baseUrl;
      document.getElementById('footerLink').href = baseUrl;

      const html = await fetchPage(musicUrl);
      if (!html) {
        document.getElementById('loadingScreen').innerHTML = '<div class="loading-text">Failed to load — check the Bandcamp URL.</div>';
        return;
      }

      // Parse artist info
      const titleMatch = html.match(/<title>(?:Music \| )?([^<]+)/);
      const artistName = titleMatch ? decodeEntities(titleMatch[1]) : 'Unknown Artist';
      const locMatch = html.match(/<span class="location secondaryText">([^<]+)/);
      const location = locMatch ? decodeEntities(locMatch[1]) : '';
      const avatarMatch = html.match(/<a class="popupImage" href="(https:\/\/f4\.bcbits\.com\/img\/[^"]+)"/) ||
                          html.match(/<img src="(https:\/\/f4\.bcbits\.com\/img\/[^"]+)"[^>]*class="band-photo/);
      const avatarUrl = avatarMatch ? avatarMatch[1] : '';

      // Parse albums — try API for full discography, fallback to HTML
      const bandIdMatch = html.match(/data-band-id="(\d+)"/);
      let albums = [];

      if (bandIdMatch) {
        try {
          const apiUrl = 'https://bandcamp.com/api/mobile/25/band_details?band_id=' + bandIdMatch[1];
          const apiHtml = await fetchPage(apiUrl);
          if (apiHtml) {
            const api = JSON.parse(apiHtml);
            if (api.discography) {
              albums = api.discography.map(d => {
                const slug = '/album/' + (d.title || '').replace(/'/g, '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-+$/, '');
                return {
                  slug,
                  title: d.title || 'Untitled',
                  art: d.art_id ? `https://f4.bcbits.com/img/a${d.art_id}_2.jpg` : '',
                  artFull: d.art_id ? `https://f4.bcbits.com/img/a${d.art_id}_10.jpg` : '',
                  url: baseUrl + slug,
                };
              });
            }
          }
        } catch (e) { /* fallback below */ }
      }

      // Fallback: parse from HTML (gets ~16)
      if (!albums.length) {
        const albumPattern = /<a href="(\/album\/[^"]+)">\s*<div class="art">\s*(?:<img[^>]*?(?:data-original|src)="(https:\/\/f4[^"]+)"[^>]*>)?\s*<\/div>\s*<p class="title">\s*([^<]+)/g;
        let m;
        while ((m = albumPattern.exec(html)) !== null) {
          const slug = m[1];
          const thumb = m[2] || '';
          const fullArt = thumb.replace('_2.jpg', '_10.jpg');
          const title = decodeEntities(m[3]);
          albums.push({ slug, title, art: fullArt, url: baseUrl + slug });
        }
      }

      // ─── RENDER ARTIST HEADER ───
      document.getElementById('artistName').textContent = artistName;
      document.getElementById('artistLabel').textContent = 'Artist';
      if (avatarUrl) {
        document.getElementById('artistAvatar').src = avatarUrl;
        document.getElementById('heroBg').style.backgroundImage = `url('${albums[0]?.art || avatarUrl}')`;
      }
      document.title = artistName + ' — Discography';

      let metaHtml = `<span>🎵 ${albums.length} Releases</span>`;
      if (location) metaHtml += `<div class="dot"></div><span>📍 ${location}</span>`;
      document.getElementById('artistMeta').innerHTML = metaHtml;
      document.getElementById('releaseCount').textContent = albums.length + ' releases';

      // ─── RENDER ALBUM GRID ───
      const grid = document.getElementById('albumGrid');
      grid.innerHTML = '';

      albums.forEach(album => {
        const card = document.createElement('div');
        card.className = 'album-card';
        card.dataset.title = album.title;
        card.dataset.art = album.artFull || album.art;
        card.dataset.bandcampUrl = album.url;
        card.addEventListener('click', () => openAlbum(card));
        card.innerHTML = `
          <div class="album-art-wrap">
            <img class="album-art" src="${album.art}" alt="${album.title}" loading="lazy">
            <div class="play-overlay"><div class="play-btn"><svg viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19"/></svg></div></div>
          </div>
          <div class="album-details">
            <div class="album-title">${album.title}</div>
          </div>`;
        grid.appendChild(card);
      });

      // ─── GSAP ANIMATIONS ───
      gsap.registerPlugin(ScrollTrigger);
      gsap.from('.avatar-wrap', { opacity: 0, scale: 0.7, duration: 0.7, ease: 'back.out(1.5)' });
      gsap.from('.artist-info > *', { opacity: 0, y: 20, duration: 0.5, stagger: 0.1, delay: 0.2, ease: 'power2.out' });
      // Animate first visible cards
      const visibleCards = Array.from(document.querySelectorAll('.album-card')).slice(0, 12);
      gsap.from(visibleCards, {
        scrollTrigger: { trigger: '.album-grid', start: 'top 85%' },
        opacity: 0, y: 30, stagger: 0.04, duration: 0.4, ease: 'power2.out',
        clearProps: 'all'
      });
    }

    // ─── ALBUM DETAIL VIEW ───
    const detailCache = {};

    async function fetchAlbumDetail(url) {
      if (detailCache[url]) return detailCache[url];
      const html = await fetchPage(url);
      if (!html) return null;

      const desc = html.match(/tralbum-about">([\s\S]*?)<\/div>/);
      const albumId = html.match(/album=(\d+)/);
      const result = {
        description: desc ? decodeEntities(desc[1]) : '',
        albumId: albumId ? albumId[1] : '',
      };
      detailCache[url] = result;
      return result;
    }

    function openAlbum(card) {
      const view = document.getElementById('albumView');
      document.getElementById('viewArt').src = card.dataset.art;
      document.getElementById('viewTitle').textContent = card.dataset.title;
      document.getElementById('viewArtist').textContent = '';

      const descEl = document.getElementById('viewDesc');
      const embedWrap = document.getElementById('viewEmbed');
      const tracklistEl = document.getElementById('viewTracks');
      descEl.textContent = 'Loading…';
      embedWrap.innerHTML = '';
      tracklistEl.innerHTML = '';

      // Fetch album detail (description + embed ID)
      if (card.dataset.bandcampUrl) {
        fetchAlbumDetail(card.dataset.bandcampUrl).then(detail => {
          if (!detail) { descEl.textContent = ''; return; }
          descEl.textContent = detail.description || '';
          if (detail.albumId) {
            embedWrap.innerHTML = '<iframe style="border:0;width:100%;height:120px;" src="https://bandcamp.com/EmbeddedPlayer/album=' + detail.albumId + '/size=large/bgcol=111114/linkcol=1db954/tracklist=false/artwork=none/transparent=true/" seamless></iframe>';
          }
          embedWrap.innerHTML += '<a href="' + card.dataset.bandcampUrl + '" target="_blank" style="display:inline-flex;align-items:center;gap:8px;margin-top:16px;padding:10px 24px;background:var(--accent);color:#000;font-weight:600;font-size:13px;border-radius:100px;letter-spacing:0.3px;transition:all 0.25s;">View on Bandcamp →</a>';
        });
      }

      view.classList.add('active');
      view.scrollTop = 0;
      document.body.style.overflow = 'hidden';
    }

    function closeAlbum() {
      document.getElementById('albumView').classList.remove('active');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeAlbum(); });

    // ─── INIT ───
    loadDiscography();
  </script>
</body>
</html>
